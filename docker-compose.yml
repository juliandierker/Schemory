name: schemory-local

# Lightweight local stack (API + Postgres + test DB). No Caddy / no prod TLS.
# Prefer docker-compose.dev.yml for day-to-day hot-reload development.
#
# Isolated from production volumes/networks (project name schemory-local).

services:
  postgres:
    image: postgres:16-alpine
    container_name: schemory-postgres-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schemory
      SCHEMORY_ENV: development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d schemory"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - schemory-local-net

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: schemory-server-local
    environment:
      NODE_ENV: development
      SCHEMORY_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: schemory
      ACTIVATION_BASE_URL: http://localhost:5173/activate
      RESEND_API_KEY: re_test_key
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - schemory-local-net

  postgres-test:
    image: postgres:16-alpine
    container_name: schemory-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schemory_test
      SCHEMORY_ENV: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d schemory_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - schemory-local-net

networks:
  schemory-local-net:
    name: schemory_local_net
    driver: bridge

volumes:
  postgres_data:
    name: schemory_local_postgres_data
