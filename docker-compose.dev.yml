name: schemory-dev

# Local development with hot reload.
# Usage: ./scripts/dev-up.sh
#        OR: docker compose -f docker-compose.dev.yml up
#
# Isolated from production: different project name, volumes, containers, network.
# Never points at api.schemory.org / production DB.

services:
  postgres:
    image: postgres:16-alpine
    container_name: schemory-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schemory
      SCHEMORY_ENV: development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d schemory"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - schemory-dev-net

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: builder
    container_name: schemory-server-dev
    command: sh -c "pnpm --filter @schemory/shared build && pnpm --filter @schemory/server install && sleep 3 && DATABASE_URL=postgres://postgres:postgres@postgres:5432/schemory npx node-pg-migrate up -m /app/server/migrations && pnpm --filter @schemory/server dev"
    working_dir: /app
    environment:
      NODE_ENV: development
      SCHEMORY_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: schemory
      ACTIVATION_BASE_URL: http://localhost:5173/activate
      RESEND_API_KEY: re_test_key
    volumes:
      - ./server/src:/app/server/src:ro,delegated
      - ./server/package.json:/app/server/package.json:ro
      - ./server/tsconfig.json:/app/server/tsconfig.json:ro
      - ./packages/shared/src:/app/packages/shared/src:ro,delegated
      - ./packages/shared/package.json:/app/packages/shared/package.json:ro
      - ./packages/shared/tsconfig.json:/app/packages/shared/tsconfig.json:ro
      - ./package.json:/app/package.json:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - server_node_modules:/app/node_modules
      - server_dist:/app/server/dist
      - shared_dist:/app/packages/shared/dist
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - schemory-dev-net

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      target: builder
    container_name: schemory-dashboard-dev
    command: sh -c "pnpm --filter @schemory/shared build && pnpm --filter @schemory/dashboard dev -- --host 0.0.0.0 --port 5173"
    working_dir: /app
    environment:
      NODE_ENV: development
      SCHEMORY_ENV: development
      PORT: 5173
      # Must match dashboard code (import.meta.env.VITE_API_URL)
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./dashboard/src:/app/dashboard/src:ro,delegated
      - ./dashboard/index.html:/app/dashboard/index.html:ro
      - ./dashboard/vite.config.ts:/app/dashboard/vite.config.ts:ro
      - ./dashboard/tsconfig.json:/app/dashboard/tsconfig.json:ro
      - ./dashboard/postcss.config.js:/app/dashboard/postcss.config.js:ro
      - ./dashboard/tailwind.config.js:/app/dashboard/tailwind.config.js:ro
      - ./dashboard/package.json:/app/dashboard/package.json:ro
      - ./packages/shared/src:/app/packages/shared/src:ro,delegated
      - ./packages/shared/package.json:/app/packages/shared/package.json:ro
      - ./packages/shared/tsconfig.json:/app/packages/shared/tsconfig.json:ro
      - ./package.json:/app/package.json:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - dashboard_node_modules:/app/node_modules
      - dashboard_dist:/app/dashboard/dist
    ports:
      - "5173:5173"
    networks:
      - schemory-dev-net

networks:
  schemory-dev-net:
    name: schemory_dev_net
    driver: bridge

volumes:
  postgres_data_dev:
    name: schemory_dev_postgres_data
  server_node_modules:
    name: schemory_dev_server_node_modules
  server_dist:
    name: schemory_dev_server_dist
  shared_dist:
    name: schemory_dev_shared_dist
  dashboard_node_modules:
    name: schemory_dev_dashboard_node_modules
  dashboard_dist:
    name: schemory_dev_dashboard_dist
