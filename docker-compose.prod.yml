version: "3.8"

services:
    # PostgreSQL - Primary database
    postgres:
        image: postgres:16-alpine
        container_name: schemory-postgres-prod
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            POSTGRES_DB: ${POSTGRES_DB:-schemory}
            PGDATA: /var/lib/postgresql/data
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s
        restart: unless-stopped
        networks:
            - schemory-network

    # Server - Fastify API
    server:
        build:
            context: .
            dockerfile: server/Dockerfile
        container_name: schemory-server-prod
        environment:
            NODE_ENV: production
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USER: ${POSTGRES_USER:-postgres}
            DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            DB_NAME: ${POSTGRES_DB:-schemory}
            ACTIVATION_BASE_URL: ${ACTIVATION_BASE_URL:-https://schemory.org/activate}
            RESEND_API_KEY: ${RESEND_API_KEY:-}
            EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-noreply@schemory.org}
            PORT: ${SERVER_PORT:-3000}
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "wget", "-q", "--spider", "--tries=1", "--timeout=5", "http://localhost:3000/health"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s
        restart: unless-stopped
        networks:
            - schemory-network
        ports:
            - "${SERVER_PORT:-3000}:3000"

    # Dashboard - React static files
    dashboard:
        build:
            context: .
            dockerfile: dashboard/Dockerfile
        container_name: schemory-dashboard-prod
        environment:
            NODE_ENV: production
        depends_on:
            server:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - schemory-network
        ports:
            - "${DASHBOARD_PORT:-80}:80"

    # Caddy - Reverse Proxy with SSL
    caddy:
        image: caddy:2-alpine
        container_name: schemory-caddy-prod
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            server:
                condition: service_healthy
            dashboard:
                condition: service_started
        restart: unless-stopped
        networks:
            - schemory-network

networks:
    schemory-network:
        driver: bridge

volumes:
    postgres_data:
    caddy_data:
    caddy_config:
